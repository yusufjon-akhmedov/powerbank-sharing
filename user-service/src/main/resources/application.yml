server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/users_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${keycloak.server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: powerbank-realm
  client-id: powerbank-app
  admin-client-id: admin-cli
  admin-client-secret: ${KEYCLOAK_ADMIN_SECRET:admin}

grpc:
  server:
    port: 9091

otp:
  ttl-minutes: 5
