_format_version: "3.0"
_transform: true

# Kong DB-less declarative configuration
# Add services and routes here as microservices are implemented.

services:
  - name: user-service
    url: http://host.docker.internal:8081
    routes:
      - name: user-routes
        paths:
          - /api/users

  - name: station-service
    url: http://host.docker.internal:8082
    routes:
      - name: station-routes
        paths:
          - /api/stations

  - name: rental-service
    url: http://host.docker.internal:8083
    routes:
      - name: rental-routes
        paths:
          - /api/rentals

  - name: payment-service
    url: http://host.docker.internal:8084
    routes:
      - name: payment-routes
        paths:
          - /api/payments
